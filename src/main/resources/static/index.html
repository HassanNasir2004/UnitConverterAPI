<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unit Converter</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        select, input, button { margin: 0.5rem; }
    </style>
</head>
<body>
<h1>Unit Converter (Web UI)</h1>

<label>Select Category:</label>
<select id="category">
    <option value="temperature">Temperature</option>
    <option value="weight">Weight</option>
    <option value="length">Length</option>
</select><br>

<label>Select Direction:</label>
<select id="direction">
    <option value="C_TO_F">Celsius to Fahrenheit</option>
    <option value="F_TO_C">Fahrenheit to Celsius</option>
    <option value="KG_TO_LBS">Kilograms to Pounds</option>
    <option value="LBS_TO_KG">Pounds to Kilograms</option>
    <option value="M_TO_FT">Meters to Feet</option>
    <option value="FT_TO_M">Feet to Meters</option>
</select><br>

<label>Enter Value:</label>
<input type="number" id="value"><br>

<button onclick="convert()">Convert</button>

<h3 id="result"></h3>

<script>
    function convert() {
        const category = document.getElementById('category').value;
        const direction = document.getElementById('direction').value;
        const value = document.getElementById('value').value;

        if (!value) {
            alert("Please enter a value.");
            return;
        }

        fetch(`/api/convert/${category}?value=${value}&direction=${direction}`)
            .then(response => response.text())
            .then(data => document.getElementById('result').innerText = `Result: ${data}`)
            .catch(() => document.getElementById('result').innerText = "Error: Unable to convert.");
    }
</script>
</body>
</html>
